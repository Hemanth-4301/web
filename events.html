<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(90deg,lightgray,skyblue);
        }
        h1 {
            margin-top: 20px;
            color: #333;
        }
        header {
            background-color: indigo;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding: 6px;
            font-size: 1.4rem;
        }
        .home {
            background-color: indigo;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.4rem;
            text-align: left;
            padding: 6px;
        }
        .homeanchortag {
            text-decoration: none;
            margin-left: 10px;
            color: white;
            padding: 0 6px;
            transition: background-color 0.3s;
        }
        .homeanchortag:hover{
            background-color: black;
            border-radius: 10px;
            box-shadow: 2px 5px 15px black;
        }
        table {
            margin: 30px auto;
            width: 80%;
            border-collapse: collapse;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(32, 18, 18, 0.9);
        }
        th, td {
            padding: 15px;
            text-align: center;
        }
        th {
            background-color: black;
            color:white;
        }
        tbody tr:nth-child(even) {
            background-color: #d1cccc;
        }
        tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }
        td {
            color: #333;
        }
        select {
            background-color: #f0f0f0;
            color: #333;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
            font-size: 16px;
        }
        button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease-in;
        }
        button:hover {
            background-color: green;
        }
        
        @media all and (max-width: 600px) {
            table, th, td {
                font-size: 14px;
            }
            .home{
                font-size: 1.2rem;
                padding:10px;
            }
        }
    </style>
</head>
